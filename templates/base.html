<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}{% endblock %}</title>

  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

  <!-- A favicon is a small image displayed next to the page title in the browser tab. -->
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  {% block additional_head_link_script %}{% endblock %}

  <!-- These are for kartik-v bootstrap-fileinput, they need to be loaded in the right order (https://github.com/kartik-v/bootstrap-fileinput). -->
  <link href="https://cdn.jsdelivr.net/gh/kartik-v/bootstrap-fileinput@5.5.2/css/fileinput.min.css" media="all" rel="stylesheet" type="text/css" />
  
  <!-- For the kartik-v bootstrap-fileinput, jquery should be loaded at the head. -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet" />
</head>

<body class="bg-body-tertiary">

  <!-- Top Navbar -->
  <nav id="navbar-id" class="navbar navbar-expand fixed-top border-bottom">
    <div class="container-fluid">
      <!-- <a class="navbar-brand" href="#" style="margin-left: 0.5rem;">{{brain.get_brain_config().get_tutor_brain_full_name()}}</a> -->
      <a class="navbar-brand ms-2 me-3" href="/">
        <img src="{{ url_for('static', filename='favicon/favicon-32x32.png') }}" alt="...">
        <!-- <b>{{brain.get_brain_config().get_tutor_brain_full_name()}}</b> -->
      </a>

      <ul class="navbar-nav w-100">
        <li class="nav-item">
          <a class="nav-link {% block index_nav_active %}{% endblock %}" href="/">Home</a>
        </li>
        <li class="nav-item dropdown ms-auto">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Hi, ******
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#">Settings</a></li>
            <li><a class="dropdown-item" href="#">Help</a></li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <div class="dropdown-item">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" role="switch" id="darkModeToggle" checked>
                  <label class="form-check-label" for="darkModeToggle"><i class="bi bi-sun"></i></label>
                </div>
              </div>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">???</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </nav>

  {% block content %}
  {% endblock %}

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <!-- These are for kartik-v bootstrap-fileinput, they need to be loaded in the right order (https://github.com/kartik-v/bootstrap-fileinput). -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/kartik-v/bootstrap-fileinput@5.5.2/js/plugins/buffer.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/kartik-v/bootstrap-fileinput@5.5.2/js/plugins/filetype.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/kartik-v/bootstrap-fileinput@5.5.2/js/plugins/piexif.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/kartik-v/bootstrap-fileinput@5.5.2/js/plugins/sortable.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/kartik-v/bootstrap-fileinput@5.5.2/js/fileinput.min.js"></script>

</body>
</html>
